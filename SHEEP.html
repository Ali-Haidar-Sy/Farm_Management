{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="login-container">
    <h2><i class="fas fa-lock"></i> تسجيل الدخول</h2>
    <form method="post">
        <div class="form-group">
            <label><i class="fas fa-user"></i> اسم المستخدم</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-key"></i> كلمة المرور</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> دخول</button>
    </form>
    <p class="demo-info">للاختبار: admin/admin123 أو worker/worker123</p>
</div>
{% endblock %}

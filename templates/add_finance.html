{% extends "base.html" %}
{% block title %}إضافة معاملة مالية{% endblock %}
{% block content %}
<h2><i class="fas fa-plus-circle"></i> إضافة معاملة مالية</h2>
<form method="post">
    <div class="form-group">
        <label>التاريخ</label>
        <input type="date" name="date" value="{{ request.form.date or '' }}" required>
    </div>
    <div class="form-group">
        <label>النوع</label>
        <select name="type" required>
            <option value="income">دخل</option>
            <option value="expense">مصروف</option>
        </select>
    </div>
    <div class="form-group">
        <label>التصنيف</label>
        <input type="text" name="category" placeholder="مثال: مبيعات حليب، أعلاف..." required>
    </div>
    <div class="form-group">
        <label>المبلغ</label>
        <input type="number" step="0.01" name="amount" required>
    </div>
    <div class="form-group">
        <label>الوصف (اختياري)</label>
        <textarea name="description" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">حفظ</button>
    <a href="{{ url_for('financial') }}" class="btn">إلغاء</a>
</form>
{% endblock %}

{% extends "base.html" %}
{% block title %}تسجيل إنتاج{% endblock %}
{% block content %}
<h2>تسجيل إنتاج جديد للحيوان رقم {{ animal_id }}</h2>
<form method="post">
    <div class="form-group">
        <label>الكمية</label>
        <input type="number" step="0.01" name="quantity" required>
    </div>
    <div class="form-group">
        <label>الوحدة</label>
        <select name="unit">
            <option value="لتر">لتر</option>
            <option value="كغم">كغم</option>
            <option value="بيضة">بيضة</option>
        </select>
    </div>
    <div class="form-group">
        <label>ملاحظات</label>
        <textarea name="notes" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">حفظ</button>
    <a href="{{ url_for('cows') }}" class="btn">إلغاء</a>
</form>
{% endblock %}
